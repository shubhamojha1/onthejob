name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate schema + build index
        run: npm run prebuild

      - name: Link check
        run: npm run link-check
        # Allow link-check failures to be advisory until we've verified all URLs.
        # Remove `continue-on-error` once all incidents are verified: true.
        continue-on-error: true

      - name: Full SSG build
        run: npm run build
