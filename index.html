<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#F2F4F6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141920" media="(prefers-color-scheme: dark)" />
  </head>
  <body>
    <script>
      // Resolve theme before first paint: stored choice, else OS preference
      try {
        var q = new URLSearchParams(location.search).get('theme')
        var t = q === 'light' || q === 'dark' ? q : localStorage.getItem('sf-theme')
        if (t !== 'light' && t !== 'dark') {
          t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        document.documentElement.dataset.theme = t
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
